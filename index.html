<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Petaluma Letter Prompt Builder</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #f5f5f5;
}

.container {
  max-width: 1200px;
  margin: auto;
  padding: 20px;
}

h1 {
  background: #1e293b;
  color: white;
  padding: 20px;
  border-radius: 12px;
}

.section {
  background: white;
  padding: 15px;
  margin-top: 15px;
  border-radius: 12px;
}

label {
  display: block;
  margin-top: 10px;
  font-weight: bold;
}

textarea, input, select {
  width: 100%;
  padding: 8px;
  margin-top: 5px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  margin-top: 15px;
  padding: 10px 15px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
}

.copy {
  background: #1e293b;
  color: white;
}

.output {
  white-space: pre-wrap;
  background: #eef;
  padding: 15px;
  border-radius: 12px;
  margin-top: 20px;
}
</style>
</head>

<body>
<div class="container">

<h1>Petaluma Letter Prompt Builder</h1>

<div class="section">
<label>Permit Type</label>
<select id="permitType">
  <option>Administrative SPAR</option>
  <option>Minor CUP</option>
  <option>Temporary Zoning Permit</option>
  <option>Zoning Verification Letter</option>
</select>

<label>Decision Number</label>
<input id="decisionNumber">

<label>Recipient Name</label>
<input id="recipientName">

<label>Site Address</label>
<input id="siteAddress">

<label>APN</label>
<input id="apn">

<label>Zoning</label>
<input id="zoning">

<label>General Plan</label>
<input id="gp">

<label>Overlay</label>
<input id="overlay">
</div>

<div class="section">
<label>Project Description (rough)</label>
<textarea id="desc"></textarea>

<label>Existing Site (rough)</label>
<textarea id="existing"></textarea>

<label>Proposed Work (rough)</label>
<textarea id="work"></textarea>

<label>Public Notice (rough)</label>
<textarea id="notice"></textarea>

<label>CEQA (rough)</label>
<textarea id="ceqa"></textarea>

<label>Conditions (rough)</label>
<textarea id="conditions"></textarea>
</div>

<div class="section">
<h3>Findings (rough input)</h3>

<textarea id="f1" placeholder="Finding 1"></textarea>
<textarea id="f2" placeholder="Finding 2"></textarea>
<textarea id="f3" placeholder="Finding 3"></textarea>
<textarea id="f4" placeholder="Finding 4"></textarea>
<textarea id="f5" placeholder="Finding 5"></textarea>
<textarea id="f6" placeholder="Finding 6"></textarea>
</div>

<button class="copy" onclick="generatePrompt()">Generate Prompt</button>

<div id="output" class="output"></div>

</div>

<script>
function clean(text) {
  if (!text) return "";
  return text
    .replace(/\s+/g, " ")
    .replace(/\bteh\b/gi, "the")
    .replace(/\bprojec?t\b/gi, "project")
    .trim();
}

function generatePrompt() {
  const permit = document.getElementById("permitType").value;

  const prompt = `
You are drafting a City of Petaluma determination letter.

Follow these rules strictly:
- Clean all input for grammar and spelling
- Use professional municipal tone (Andrew-style)
- Include CEQA and Public Notice EVERY TIME
- Include ONLY required findings (no extra)
- Use concise no-change logic where appropriate
- Do not invent facts
- Output a complete finished letter only

LETTER STRUCTURE:
1. Intro paragraph
2. Project Description
3. Public Notice
4. Findings
5. CEQA
6. Conditions
7. Appeal/Validity
8. Signature

PROJECT DATA:
- Permit Type: ${permit}
- Decision #: ${document.getElementById("decisionNumber").value}
- Recipient: ${document.getElementById("recipientName").value}
- Site Address: ${document.getElementById("siteAddress").value}
- APN: ${document.getElementById("apn").value}
- Zoning: ${document.getElementById("zoning").value}
- General Plan: ${document.getElementById("gp").value}
- Overlay: ${document.getElementById("overlay").value}

CLEAN AND USE THIS INPUT:

Project Description:
${clean(document.getElementById("desc").value)}

Existing Site:
${clean(document.getElementById("existing").value)}

Proposed Work:
${clean(document.getElementById("work").value)}

Public Notice:
${clean(document.getElementById("notice").value)}

CEQA:
${clean(document.getElementById("ceqa").value)}

Conditions:
${clean(document.getElementById("conditions").value)}

FINDINGS:
1. ${clean(document.getElementById("f1").value)}
2. ${clean(document.getElementById("f2").value)}
3. ${clean(document.getElementById("f3").value)}
4. ${clean(document.getElementById("f4").value)}
5. ${clean(document.getElementById("f5").value)}
6. ${clean(document.getElementById("f6").value)}

Now draft the final letter.
`;

  document.getElementById("output").innerText = prompt;
}
</script>

</body>
</html>
